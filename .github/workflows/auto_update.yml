name: Auto Update Financial Data

on:
  schedule:
    # 北京时间每天上午 9:00 对应 UTC 每天凌晨 1:00
    - cron: '0 1 * * *'
  # 允许在 GitHub Actions 页面手动触发，方便调试
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予工作流向仓库写入代码的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl

      - name: Run upload_data.py
        run: python upload_data.py

      - name: Commit and push updated database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add my_data.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update my_data.db at $(date -Iseconds)"
            git push
          fi
